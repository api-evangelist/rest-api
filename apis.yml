aid: rest-api
name: REST API
description: >-
  Representational State Transfer (REST) is an architectural style for
  designing networked applications using standard HTTP methods and stateless
  communication between client and server. REST APIs define how client and
  server applications communicate over the web using GET, POST, PUT, DELETE, and
  PATCH methods against resource-oriented URLs. REST is the dominant API
  paradigm, used by 89% of organisations as their primary API format. This index
  covers the REST API landscape including specifications, tools, frameworks,
  best practices, and educational resources.
